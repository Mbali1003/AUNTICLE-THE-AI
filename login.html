<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AUNTICLE THE AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.auth-card{
    width:400px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.auth-card h1{
    text-align:center;
    margin-bottom:25px;
    color:#fff;
}

.auth-card input{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin:10px 0 20px;
    color:white;
}

.options a{
    color:#38bdf8;
    text-decoration:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#7c3aed,#ec4899);
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
    color:white;
}

.bottom-text a{
    color:#38bdf8;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>Welcome Back</h1>

<form>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<div class="options">

<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">Login</button>

</form>

<p class="bottom-text">
Don't have an account?
<a href="signup.html">
